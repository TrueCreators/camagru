services:
  nginx:
    image: nginx:alpine
    container_name: camagru_nginx
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
      - ./templates:/var/www/html/templates
      - ./assets:/var/www/html/assets
      - ./config:/var/www/html/config
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - camagru_network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: camagru_php
    volumes:
      - ./public:/var/www/html/public
      - ./src:/var/www/html/src
      - ./templates:/var/www/html/templates
      - ./assets:/var/www/html/assets
      - ./config:/var/www/html/config
      - ./scripts:/var/www/html/scripts
      - ./.env:/var/www/html/.env
    environment:
      - PHP_MEMORY_LIMIT=256M
    depends_on:
      - mysql
    networks:
      - camagru_network

  mailpit:
    image: axllent/mailpit
    container_name: camagru_mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - camagru_network

  mysql:
    image: mysql:8.0
    container_name: camagru_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-camagru}
      MYSQL_USER: ${DB_USER:-camagru_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-camagru_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - camagru_network

networks:
  camagru_network:
    driver: bridge

volumes:
  mysql_data:
